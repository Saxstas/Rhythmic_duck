<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0; padding: 10px;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .main-container {
            width: 100%; max-width: 500px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.2rem; color: #00cec9; text-transform: uppercase; margin: 5px 0 10px 0; letter-spacing: 2px; }
        h3 { font-size: 0.9rem; color: #a4b0be; margin-bottom: 15px; }

        /* Экраны */
        .screen { display: none; }
        #menuScreen { display: block; }

        .levels-container {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
            margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px;
        }

        .level-btn {
            background: #2d2d44; color: white; border: 1px solid #3d3d5c;
            padding: 10px 0; font-size: 14px; font-weight: bold; border-radius: 8px;
            cursor: pointer;
        }

        .level-btn.active {
            background: #00cec9; color: #1a1a2e; border-color: #00cec9;
            box-shadow: 0 0 15px rgba(0, 206, 201, 0.5);
        }

        .primary-btn {
            background: linear-gradient(135deg, #00cec9, #0984e3);
            color: white; font-weight: bold; width: 100%; padding: 15px;
            font-size: 18px; border-radius: 12px; border: none; margin-bottom: 10px;
            cursor: pointer;
        }

        .secondary-btn {
            background: #2d2d44; color: white; border: none; padding: 10px 15px;
            border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px;
            cursor: pointer;
        }

        /* Игровой интерфейс */
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        .game-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3); padding: 10px 20px; border-radius: 12px; margin-bottom: 15px;
        }
        .score-box { font-weight: bold; color: #fdcb6e; font-size: 1.1rem; }
        .feedback-box { font-weight: bold; color: #00cec9; min-width: 120px; text-align: right; font-size: 0.9rem; }

        .grid {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            min-height: 140px; background: rgba(0,0,0,0.4); border-radius: 15px;
            padding: 15px; margin-bottom: 15px; border: 2px solid #2d2d44;
        }

        .image-card {
            width: 20vw; height: 20vw; max-width: 80px; max-height: 80px;
            object-fit: cover; border-radius: 10px; border: 3px solid #3d3d5c;
            opacity: 0; transition: 0.1s; background: #2d2d44;
        }
        .image-card.loaded { opacity: 1; }
        .image-card.double-size { width: 42vw; max-width: 170px; }
        .active-slot { border-color: #00cec9 !important; transform: scale(1.05); }

        .metronome-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #bpmRange { width: 100%; margin: 10px 0; accent-color: #00cec9; }

        /* Калибровка */
        #calibProgress { font-size: 1.5rem; color: #fdcb6e; margin: 20px 0; font-weight: bold; min-height: 2em; }
        #calibValueDisplay { margin-bottom: 20px; color: #a4b0be; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-container">
    
    <div id="menuScreen" class="screen">
        <h1>RHYTHM MASTER</h1>
        <h3>ВЫБЕРИТЕ УРОВЕНЬ</h3>
        <div class="levels-container" id="levelsGrid"></div>
        <button id="startGameBtn" class="primary-btn">ИГРАТЬ</button>
        <button id="calibOpenBtn" class="secondary-btn">⚙️ НАСТРОИТЬ ЗАДЕРЖКУ</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="nav-header">
            <button id="backBtn" class="secondary-btn" style="width:auto; margin-bottom:0;">← МЕНЮ</button>
            <h1 style="margin: 0; font-size: 1rem;">LVL <span id="currentLevelDisplay">1</span></h1>
        </div>
        <div class="game-panel">
            <div class="score-box">SCORE: <span id="scoreDisplay">0</span></div>
            <div class="feedback-box" id="feedbackDisplay">READY</div>
        </div>
        <button id="rollButton" class="primary-btn">ВРАЩАТЬ</button>
        <div id="imageContainer" class="grid"></div>
        <div class="metronome-box">
            <div style="font-weight: bold;"><span id="bpmValue">120</span> BPM</div>
            <input type="range" id="bpmRange" min="40" max="200" value="120">
            <button id="metronomeBtn" class="primary-btn" style="margin:0;">СТАРТ</button>
        </div>
    </div>

    <div id="calibrationScreen" class="screen">
        <h1>КАЛИБРОВКА</h1>
        <p style="font-size: 0.8rem; color: #a4b0be;">Мы установим 70 BPM для точности.<br>Сначала 4 удара отсчета, затем тапайте в такт.</p>
        <div id="calibProgress">НАЖМИТЕ НАЧАТЬ</div>
        <div id="calibValueDisplay">Задержка: --</div>
        <button id="calibStartBtn" class="primary-btn">НАЧАТЬ</button>
        <button id="calibBackBtn" class="secondary-btn">ГОТОВО</button>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const levelPacks = {
    1: [
        { src: "Lvl1/s1.png", size: 1, pattern: [0] }, 
        { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }
    ],
    2: [
        { src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }
    ],
    3: [
        { src: "Lvl3/4.png", size: 1, pattern: [] }, 
        { src: "Lvl3/5.png", size: 1, pattern: [] }, 
        { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }
    ],
    4: [
        { src: "Lvl4/size2/9.png", size: 2, pattern: [0, 1, 1.5] }
    ],
    5: [
        { src: "Lvl5/3.png", size: 1, pattern: [0.5] }
    ],
    6: [
        { src: "Lvl6/Size2/7.png", size: 2, pattern: [0, 1.5] }, 
        { src: "Lvl6/Size2/8.png", size: 2, pattern: [0, 0.5] }
    ],
    7: [
        { src: "Lvl7/Size2/10.png", size: 2, pattern: [0.5, 1.5] }, 
        { src: "Lvl7/Size2/11.png", size: 2, pattern: [0.5] }
    ],
    8: [
        { src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }
    ],
    9: [
        { src: "Lvl9/27.png", size: 1, pattern: [0, 0.5, 0.75] }, 
        { src: "Lvl9/26.png", size: 1, pattern: [0, 0.25, 0.5] }
    ],
    10: [
        { src: "Lvl10/13.png", size: 1, pattern: [0, 0.25, 0.50] }, 
        { src: "Lvl10/15.png", size: 1, pattern: [0, 0.50, 0.75] }
    ],
    11: [
        { src: "Lvl11/18.png", size: 1, pattern: [0.50, 0.75] }, 
        { src: "Lvl11/19.png", size: 1, pattern: [0, 0.25] }
    ],
    12: [
        { src: "Lvl12/25.png", size: 1, pattern: [0.25, 0.5, 0.75] }
    ],
    13: [
        { src: "Lvl13/14.png", size: 1, pattern: [0, 0.25, 0.75] }, 
        { src: "Lvl13/31.png", size: 1, pattern: [0, 0.75] }
    ],
    14: [
        { src: "Lvl14/20.png", size: 1, pattern: [0, 0.5] }
    ],
    15: [
        { src: "Lvl15/17.png", size: 1, pattern: [0, 0.25] }, 
        { src: "Lvl15/23.png", size: 1, pattern: [0, 0.75] }
    ],
    16: [
        { src: "Lvl16/21.png", size: 1, pattern: [0.25, 0.5, 0.75] }
    ],
    17: [
        { src: "Lvl17/16.png", size: 1, pattern: [0.25, 0.75] }, 
        { src: "Lvl17/33.png", size: 1, pattern: [0.25] }
    ],
    18: [
        { src: "Lvl18/34.png", size: 1, pattern: [0.75] }
    ],
    19: [
        { src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }
    ]
};
    let currentLevel = 1, score = 0, currentSequence = [], currentSlotIndex = -1;
    let targetTimings = [], isRunning = false, audioCtx, nextBeatTime, timerID, lastBeatStartTime = 0;
    
    // Параметры калибровки и отсчета
    let userOffset = parseFloat(localStorage.getItem('rhythm_offset')) || 0.17;
    let calibrationData = [], isCalibrating = false;
    let countdownBeats = 0, isPlayingSequence = false;
    let savedBPM = 120;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // --- ИНИЦИАЛИЗАЦИЯ МЕНЮ ---
    function initLevels() {
        const grid = document.getElementById('levelsGrid');
        for(let i=1; i<=19; i++) {
            const b = document.createElement('button');
            b.className = 'level-btn' + (i === 1 ? ' active' : '');
            b.innerText = i;
            b.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
                b.classList.add('active');
                currentLevel = i;
                if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
            };
            grid.appendChild(b);
        }
    }

    // --- ЛОГИКА ЭКРАНОВ ---
    document.getElementById('startGameBtn').onclick = () => {
        showScreen('gameScreen');
        document.getElementById('currentLevelDisplay').innerText = currentLevel;
        roll();
    };

    document.getElementById('backBtn').onclick = () => {
        stopMetronome();
        showScreen('menuScreen');
    };

    document.getElementById('calibOpenBtn').onclick = () => {
        showScreen('calibrationScreen');
        document.getElementById('calibValueDisplay').innerText = `Текущая задержка: ${userOffset.toFixed(3)}s`;
        document.getElementById('calibProgress').innerText = "ГОТОВ К ТЕСТУ";
    };

    document.getElementById('calibBackBtn').onclick = () => {
        stopMetronome();
        isCalibrating = false;
        document.getElementById('bpmRange').value = savedBPM;
        document.getElementById('bpmValue').innerText = savedBPM;
        showScreen('menuScreen');
    };

    // --- ИГРОВАЯ ЛОГИКА ---
    function roll() {
        const pool = [];
        for(let i=1; i<=currentLevel; i++) if(levelPacks[i]) pool.push(...levelPacks[i]);
        let sequence = [], totalSize = 0;
        const smalls = pool.filter(x => x.size === 1);
        while(totalSize < 4) {
            let item = pool[Math.floor(Math.random() * pool.length)];
            if(totalSize + item.size > 4) item = smalls[Math.floor(Math.random() * smalls.length)];
            if(!item) break;
            sequence.push(item);
            totalSize += item.size;
        }
        currentSequence = sequence;
        const container = document.getElementById('imageContainer');
        container.innerHTML = '';
        currentSequence.forEach(item => {
            const img = document.createElement('img');
            img.src = item.src;
            img.className = 'image-card' + (item.size === 2 ? ' double-size' : '');
            img.onload = () => img.classList.add('loaded');
            container.appendChild(img);
        });
    }

    function playTick() {
        if (!audioCtx) return;
        const bpm = document.getElementById('bpmRange').value;
        const secondsPerBeat = 60 / bpm;

        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        // ФАЗА ОТСЧЕТА
        if (countdownBeats > 0) {
            osc.frequency.value = countdownBeats === 1 ? 1200 : 800;
            g.gain.value = 0.1;
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            
            let msg = `ПРИГОТОВИТЬСЯ: ${countdownBeats}`;
            if(isCalibrating) document.getElementById('calibProgress').innerText = msg;
            else updateFeedback(msg, "#fdcb6e");

            countdownBeats--;
            if (countdownBeats === 0) {
                currentSlotIndex = -1;
                isPlayingSequence = true;
                setTimeout(() => {
                    if(isCalibrating) document.getElementById('calibProgress').innerText = "ТАПАЙТЕ!";
                    else updateFeedback("ИГРАЕМ!", "#00cec9");
                }, (secondsPerBeat * 1000) - 50);
            }
            return;
        }

        // ФАЗА РИТМА
        currentSlotIndex = (currentSlotIndex + 1) % 4;
        osc.frequency.value = currentSlotIndex === 0 ? 1000 : 600;
        g.gain.value = 0.1;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        lastBeatStartTime = audioCtx.currentTime;

        if (!isCalibrating) {
            const cards = document.querySelectorAll('.image-card');
            cards.forEach(c => c.classList.remove('active-slot'));
            let acc = 0;
            currentSequence.forEach((item, idx) => {
                if(currentSlotIndex >= acc && currentSlotIndex < acc + item.size) {
                    cards[idx].classList.add('active-slot');
                    if(currentSlotIndex === acc) {
                        targetTimings = item.pattern.map(p => lastBeatStartTime + (p * secondsPerBeat));
                    }
                }
                acc += item.size;
            });
        }
    }

    function scheduler() {
        if(!isRunning) return;
        while(nextBeatTime < audioCtx.currentTime + 0.1) {
            playTick();
            nextBeatTime += 60 / document.getElementById('bpmRange').value;
        }
        timerID = setTimeout(scheduler, 25);
    }

    function handleTap() {
        if(!isRunning || !isPlayingSequence) return;
        const now = audioCtx.currentTime;

        if (isCalibrating) {
            let diff = now - lastBeatStartTime;
            const spb = 60 / 70;
            if (diff > spb / 2) diff -= spb;
            
            calibrationData.push(diff);
            document.getElementById('calibProgress').innerText = `ЗАПИСЬ: ${calibrationData.length} / 10`;
            
            if (calibrationData.length >= 10) {
                userOffset = calibrationData.reduce((a,b)=>a+b, 0) / 10;
                localStorage.setItem('rhythm_offset', userOffset);
                document.getElementById('calibValueDisplay').innerText = `Сохранено: ${userOffset.toFixed(3)}s`;
                document.getElementById('calibProgress').innerText = "ГОТОВО ✅";
                document.getElementById('calibStartBtn').innerText = "ЕЩЕ РАЗ";
                stopMetronome();
            }
            return;
        }

        let isHit = false;
        for(let i=0; i < targetTimings.length; i++) {
            const diff = Math.abs(now - (targetTimings[i] + userOffset));
            if(diff < 0.18) { 
                targetTimings.splice(i, 1);
                score += 100; isHit = true;
                updateFeedback("PERFECT!", "#00cec9");
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                break;
            }
        }
        if(!isHit) { 
            score = Math.max(0, score - 50); 
            updateFeedback("MISS!", "#ff4757"); 
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
        document.getElementById('scoreDisplay').innerText = score;
    }

    function stopMetronome() {
        isRunning = false;
        isPlayingSequence = false;
        clearTimeout(timerID);
        const btn = document.getElementById('metronomeBtn');
        btn.innerText = "СТАРТ"; btn.style.background = "";
        document.querySelectorAll('.image-card').forEach(c => c.classList.remove('active-slot'));
        targetTimings = [];
    }

    function updateFeedback(text, color) {
        const fb = document.getElementById('feedbackDisplay');
        fb.innerText = text; fb.style.color = color;
    }

    document.getElementById('metronomeBtn').onclick = function() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(!isRunning) {
            isRunning = true; countdownBeats = 4;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            nextBeatTime = audioCtx.currentTime; scheduler();
            this.innerText = "СТОП"; this.style.background = "#ff4757";
        } else { stopMetronome(); }
    };

    document.getElementById('calibStartBtn').onclick = function() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        savedBPM = document.getElementById('bpmRange').value;
        document.getElementById('bpmRange').value = 70;
        document.getElementById('bpmValue').innerText = 70;

        calibrationData = []; 
        isCalibrating = true; 
        isRunning = true; 
        isPlayingSequence = false;
        countdownBeats = 4;
        
        if (audioCtx.state === 'suspended') audioCtx.resume();
        nextBeatTime = audioCtx.currentTime; 
        scheduler();
        this.innerText = "СЛУШАЙТЕ...";
    };

    document.getElementById('rollButton').onclick = () => {
        roll();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    };
    
    document.getElementById('bpmRange').oninput = function() { 
        document.getElementById('bpmValue').innerText = this.value; 
    };

    document.addEventListener('touchstart', (e) => {
        if(e.target.closest('button') || e.target.closest('input')) return;
        e.preventDefault(); handleTap();
    }, { passive: false });

    initLevels();
</script>
</body>
</html>
