<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1e1e26;
            --accent-color: #00cec9;
            --error-color: #ff4757;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Навигация */
        .nav-panel {
            background: #16161e;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid #333;
            align-items: center;
        }

        .row { display: flex; gap: 15px; align-items: center; justify-content: center; width: 100%; }

        select, input[type="range"] {
            background: #2d2d3a;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 5px 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
            min-width: 70px;
        }

        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; display: block; }
        .value { font-size: 1rem; font-weight: bold; color: var(--accent-color); }

        /* Игровая зона */
        .game-world {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #feedback {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            height: 30px;
        }

        .cards-display {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            min-height: 110px;
        }

        .card {
            height: 100px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            position: relative;
        }

        .card img { max-width: 80%; max-height: 80%; }
        .card.active { border-color: var(--accent-color); transform: scale(1.05); box-shadow: 0 0 15px rgba(0,206,201,0.2); }
        .card.error { border-color: var(--error-color); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .main-btn {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--accent-color), #0984e3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            user-select: none;
        }

        /* Кнопки внизу */
        .bottom-actions {
            padding: 20px;
            background: #16161e;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #333;
            color: white;
        }

        .btn-primary { background: var(--accent-color); color: black; }
    </style>
</head>
<body>

<div class="nav-panel">
    <div class="row">
        <div style="text-align:center">
            <span class="label">Уровень</span>
            <select id="lvlSelector" onchange="updateLvl(this.value)"></select>
        </div>
        <div style="text-align:center">
            <span class="label">BPM: <span id="bpmText">70</span></span>
            <input type="range" id="bpmSlider" min="40" max="200" value="70" oninput="updateBpm(this.value)">
        </div>
    </div>
</div>

<div class="row" style="margin-top: 15px;">
    <div class="stat-card"><span class="label">Счет</span><span id="score" class="value">0</span></div>
    <div class="stat-card"><span class="label">Оффсет</span><span id="offset" class="value">0.000</span></div>
</div>

<div class="game-world">
    <div id="feedback">НАЖМИ START</div>
    <div class="cards-display" id="cardsRow"></div>
    <div class="main-btn" id="hitBtn">HIT</div>
</div>

<div class="bottom-actions">
    <button class="btn" onclick="calibrate()">CALIB</button>
    <button class="btn btn-primary" onclick="startApp()">START</button>
    <button class="btn" onclick="stopApp()">STOP</button>
</div>

<script>
    // ТВОЯ БАЗА ДАННЫХ (БЕЗ ИЗМЕНЕНИЙ)
    const levelPacks = { 1: [{ src: "Lvl1/s1.png", size: 1, pattern: [0] }, { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }], 2: [{ src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }], 3: [{ src: "Lvl3/4.png", size: 1, pattern: [] }, { src: "Lvl3/5.png", size: 1, pattern: [] }, { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }], 4: [{ src: "Lvl4/size2/9.png", size: 2, pattern: [0, 1, 1.5] }], 5: [{ src: "Lvl5/3.png", size: 1, pattern: [0.5] }], 6: [{ src: "Lvl6/Size2/7.png", size: 2, pattern: [0, 1.5] }, { src: "Lvl6/Size2/8.png", size: 2, pattern: [0, 0.5] }], 7: [{ src: "Lvl7/Size2/10.png", size: 2, pattern: [0.5, 1.5] }, { src: "Lvl7/Size2/11.png", size: 2, pattern: [0.5] }], 8: [{ src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }], 9: [{ src: "Lvl9/27.png", size: 1, pattern: [0, 0.5, 0.75] }, { src: "Lvl9/26.png", size: 1, pattern: [0, 0.25, 0.5] }], 10: [{ src: "Lvl10/13.png", size: 1, pattern: [0, 0.25, 0.50] }, { src: "Lvl10/15.png", size: 1, pattern: [0, 0.50, 0.75] }], 11: [{ src: "Lvl11/18.png", size: 1, pattern: [0.50, 0.75] }, { src: "Lvl11/19.png", size: 1, pattern: [0, 0.25] }], 12: [{ src: "Lvl12/25.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 13: [{ src: "Lvl13/14.png", size: 1, pattern: [0, 0.25, 0.75] }, { src: "Lvl13/31.png", size: 1, pattern: [0, 0.75] }], 14: [{ src: "Lvl14/20.png", size: 1, pattern: [0, 0.5] }], 15: [{ src: "Lvl15/17.png", size: 1, pattern: [0, 0.25] }, { src: "Lvl15/23.png", size: 1, pattern: [0, 0.75] }], 16: [{ src: "Lvl16/21.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 17: [{ src: "Lvl17/16.png", size: 1, pattern: [0.25, 0.75] }, { src: "Lvl17/33.png", size: 1, pattern: [0.25] }], 18: [{ src: "Lvl18/34.png", size: 1, pattern: [0.75] }], 19: [{ src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }] };

    let audioCtx;
    let curLvl = 1;
    let bpm = 70;
    let score = 0;
    let isRunning = false;
    let isPlaying = false;
    let nextTime = 0;
    let slot = -1;
    let offset = parseFloat(localStorage.getItem('r_off') || '0');

    let targets = [];
    let sequence = [];
    let cycleHits = 0;
    let expectedHits = 0;

    // Инициализация меню
    const sel = document.getElementById('lvlSelector');
    Object.keys(levelPacks).forEach(l => {
        let o = document.createElement('option'); o.value = l; o.innerText = "Lvl " + l;
        sel.appendChild(o);
    });

    function updateLvl(v) { curLvl = v; stopApp(); generate(); }
    function updateBpm(v) { bpm = v; document.getElementById('bpmText').innerText = v; }

    function generate() {
        const row = document.getElementById('cardsRow');
        row.innerHTML = '';
        sequence = [];
        expectedHits = 0;
        let filled = 0;
        const pack = levelPacks[curLvl];

        while(filled < 4) {
            let item = pack[Math.floor(Math.random() * pack.length)];
            if (filled + item.size > 4) item = pack.find(p => p.size === 1) || pack[0];

            sequence.push({ ...item, start: filled });
            const el = document.createElement('div');
            el.className = 'card';
            el.id = `c-${filled}`;
            el.style.width = item.size === 2 ? '170px' : '80px';
            // Если картинка не загрузится, покажем текст
            el.innerHTML = `<img src="${item.src}" onerror="this.style.display='none'; this.parentNode.innerText='${item.src.split('/').pop()}'">`;
            row.appendChild(el);
            expectedHits += item.pattern.length;
            filled += item.size;
        }
    }

    function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startApp() {
        unlockAudio();
        if (isRunning) return;
        isRunning = true; score = 0; slot = -1; isPlaying = false;
        document.getElementById('score').innerText = "0";
        nextTime = audioCtx.currentTime + 0.1;
        tickLoop();
    }

    function stopApp() { isRunning = false; isPlaying = false; targets = []; }

    function tickLoop() {
        if (!isRunning) return;
        const spb = 60 / bpm;
        while (nextTime < audioCtx.currentTime + 0.1) {
            runTick(nextTime, spb);
            nextTime += spb;
        }
        requestAnimationFrame(tickLoop);
    }

    function runTick(t, spb) {
        slot++;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

        if (slot >= 0 && slot < 4) {
            const active = sequence.find(c => slot >= c.start && slot < c.start + c.size);
            if (active) document.getElementById(`c-${active.start}`).classList.add('active');

            if (isPlaying) {
                const card = sequence.find(c => c.start === slot);
                if (card) {
                    card.pattern.forEach(p => {
                        targets.push({ time: t + (p * spb), id: `c-${card.start}` });
                    });
                }
            }
        }

        // Звук метронома
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = slot === 0 ? 880 : 440;
        g.gain.setValueAtTime(0.05, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);

        if (slot === 3) {
            if (!isPlaying) { isPlaying = true; slot = -1; setF("GO!", "#00cec9"); }
            else { setTimeout(validate, 150); }
        }
    }

    function validate() {
        if (cycleHits >= expectedHits) { setF("PERFECT!", "#f1c40f"); generate(); }
        cycleHits = 0; slot = -1; isPlaying = false; targets = [];
    }

    function handleTap() {
        unlockAudio();
        if (!isRunning || !isPlaying) return;
        const now = audioCtx.currentTime;
        let hit = false;

        for (let i = 0; i < targets.length; i++) {
            const diff = Math.abs(now - (targets[i].time + offset));
            if (diff < 0.2) {
                targets.splice(i, 1);
                score += 100; cycleHits++; hit = true;
                setF("HIT!", "#00cec9");
                break;
            }
        }

        if (!hit) {
            setF("MISS!", "#ff4757");
            const active = sequence.find(c => slot >= c.start && slot < c.start + c.size);
            if (active) {
                const el = document.getElementById(`c-${active.start}`);
                el.classList.add('error');
                setTimeout(() => el.classList.remove('error'), 300);
            }
        }
        document.getElementById('score').innerText = score;
    }

    function setF(t, c) { const f = document.getElementById('feedback'); f.innerText = t; f.style.color = c; }

    function calibrate() {
        unlockAudio();
        offset = 0; let s = [];
        setF("TAP 4 TIMES", "#f1c40f");
        const h = () => {
            s.push(audioCtx.currentTime - nextTime);
            if (s.length >= 4) {
                offset = s.reduce((a,b)=>a+b)/4;
                localStorage.setItem('r_off', offset);
                document.getElementById('offset').innerText = offset.toFixed(3);
                window.removeEventListener('mousedown', h);
                setF("READY", "#00cec9");
            }
        };
        window.addEventListener('mousedown', h);
        startApp();
    }

    document.getElementById('hitBtn').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
    document.getElementById('hitBtn').addEventListener('mousedown', handleTap);
    
    document.getElementById('offset').innerText = offset.toFixed(3);
    generate();
</script>

</body>
</html>
