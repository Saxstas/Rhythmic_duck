<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; text-align: center; background-color: #1a1a2e; color: #ffffff; margin: 0; padding: 10px; overflow: hidden; user-select: none; touch-action: none; }
        .main-container { width: 100%; max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; color: #00cec9; text-transform: uppercase; margin: 5px 0 5px 0; letter-spacing: 2px; }
        .screen { display: none; }
        #menuScreen { display: block; }
        
        .rank-box { background: linear-gradient(135deg, rgba(0, 206, 201, 0.1), rgba(9, 132, 227, 0.1)); border: 1px solid rgba(0, 206, 201, 0.3); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .rank-title { font-weight: bold; color: #00cec9; }
        .total-stars { color: #fdcb6e; font-weight: bold; }
        
        .levels-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .level-btn { background: #2d2d44; color: white; border: 1px solid #3d3d5c; padding: 8px 0; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .level-btn.active { background: #00cec9; color: #1a1a2e; border-color: #00cec9; box-shadow: 0 0 15px rgba(0, 206, 201, 0.5); }
        .level-stars { font-size: 10px; color: #fdcb6e; }

        .primary-btn { background: linear-gradient(135deg, #00cec9, #0984e3); color: white; font-weight: bold; width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; border: none; margin-bottom: 10px; cursor: pointer; }
        .secondary-btn { background: #2d2d44; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        .stars-display { font-size: 1.2rem; display: flex; gap: 4px; }
        .star-item { color: rgba(255, 255, 255, 0.15); transition: all 0.3s; }
        .star-item.filled { color: #fdcb6e; text-shadow: 0 0 8px rgba(253, 203, 110, 0.6); }
        .star-pop { animation: starPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes starPop { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

        .grid { display: flex; justify-content: center; align-items: center; gap: 8px; min-height: 140px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 2px solid #2d2d44; }
        .image-card { width: 20vw; height: 20vw; max-width: 80px; max-height: 80px; object-fit: cover; border-radius: 10px; border: 3px solid #3d3d5c; opacity: 0; transition: 0.1s; background: #2d2d44; }
        .image-card.loaded { opacity: 1; }
        .image-card.double-size { width: 42vw; max-width: 170px; }
        .active-slot { border-color: #00cec9 !important; transform: scale(1.05); }
        .error-hit { border-color: #ff4757 !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .tap-area { background: rgba(0, 206, 201, 0.05); border: 2px dashed #00cec9; border-radius: 15px; height: 100px; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; color: #00cec9; font-weight: bold; cursor: pointer; }
        .tap-area:active { background: rgba(0, 206, 201, 0.2); }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menuScreen" class="screen">
        <h1>RHYTHM MASTER</h1>
        <div class="rank-box">
            <div>Ранг: <span class="rank-title" id="playerRank">Новичок</span></div>
            <div class="total-stars" id="totalStarsDisplay">★ 0</div>
        </div>
        <div class="levels-container" id="levelsGrid"></div>
        <button id="startGameBtn" class="primary-btn">ИГРАТЬ</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="nav-header">
            <button id="backBtn" class="secondary-btn" style="width:auto; margin:0">← МЕНЮ</button>
            <div class="stars-display" id="gameStarsDisplay"></div>
            <h1 style="margin:0; font-size: 1rem;">LVL <span id="currentLevelDisplay">1</span></h1>
        </div>
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <div style="color:#fdcb6e; font-weight:bold">SCORE: <span id="scoreDisplay">0</span></div>
            <div id="feedbackDisplay" style="color:#00cec9; font-weight:bold">READY</div>
        </div>
        <button id="shuffleBtn" class="primary-btn" style="padding: 10px; font-size: 14px;">ПЕРЕМЕШАТЬ КАРТЫ</button>
        <div id="imageContainer" class="grid"></div>
        <div id="tapArea" class="tap-area">ТАПАЙ В РИТМ</div>
        <div style="margin-top:15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;">
            <button id="metronomeBtn" class="primary-btn" style="margin:0">СТАРТ</button>
            <input type="range" id="bpmRange" min="60" max="180" value="120" style="width:100%; margin: 10px 0;">
            <div id="bpmValue">120 BPM</div>
        </div>
    </div>
</div>

<script>
    const levelPacks = {
        1: [{ src: "Lvl1/s1.png", size: 1, pattern: [0] }, { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }],
        2: [{ src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }],
        3: [{ src: "Lvl3/4.png", size: 1, pattern: [] }, { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }],
        8: [{ src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }],
        19: [{ src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }]
    };

    let currentLevel = 1, score = 0, currentSlotIndex = -1;
    let targetTimings = [], isRunning = false, audioCtx, nextBeatTime, timerID;
    let expectedHits = 0, currentCycleHits = 0, currentCycleMisses = 0;
    let perfectStreak = 0, lastStarsCount = 0;
    let countdownBeats = 0, isPlayingSequence = false;

    let levelStars = JSON.parse(localStorage.getItem('rhythm_stars')) || {};
    let userOffset = 0.15;

    function updateRank() {
        let total = Object.values(levelStars).reduce((a, b) => a + b, 0);
        document.getElementById('totalStarsDisplay').innerText = `★ ${total}`;
        let rank = "Новичок", color = "#a4b0be";
        if (total >= 40) { rank = "Бог Ритма"; color = "#ff4757"; }
        else if (total >= 25) { rank = "Мастер"; color = "#fdcb6e"; }
        else if (total >= 10) { rank = "Профи"; color = "#00cec9"; }
        const rEl = document.getElementById('playerRank');
        rEl.innerText = rank; rEl.style.color = color;
    }

    function initLevels() {
        updateRank();
        const grid = document.getElementById('levelsGrid');
        grid.innerHTML = '';
        for(let i=1; i<=19; i++) {
            const b = document.createElement('button');
            const stars = levelStars[i] || 0;
            b.className = 'level-btn' + (i === currentLevel ? ' active' : '');
            b.innerHTML = `<span>${i}</span><span class="level-stars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</span>`;
            b.onclick = () => { currentLevel = i; initLevels(); };
            grid.appendChild(b);
        }
    }

    function updateStarsUI() {
        const display = document.getElementById('gameStarsDisplay');
        let currentStars = perfectStreak >= 5 ? 3 : (perfectStreak >= 2 ? 2 : (perfectStreak >= 1 ? 1 : 0));
        display.innerHTML = '';
        for(let s=0; s<3; s++) {
            const span = document.createElement('span');
            span.className = 'star-item' + (s < currentStars ? ' filled' : '');
            if (s < currentStars && s >= lastStarsCount) span.classList.add('star-pop');
            span.innerText = '★';
            display.appendChild(span);
        }
        if (currentStars > (levelStars[currentLevel] || 0)) {
            levelStars[currentLevel] = currentStars;
            localStorage.setItem('rhythm_stars', JSON.stringify(levelStars));
        }
        lastStarsCount = currentStars;
    }

    function roll() {
        const pool = [];
        for(let i=1; i<=currentLevel; i++) if(levelPacks[i]) pool.push(...levelPacks[i]);
        let seq = [], total = 0;
        while(total < 4) {
            let item = pool[Math.floor(Math.random() * pool.length)];
            if(total + item.size <= 4) { seq.push(item); total += item.size; }
        }
        currentSequence = seq;
        expectedHits = seq.reduce((s, i) => s + i.pattern.length, 0);
        const container = document.getElementById('imageContainer');
        container.innerHTML = '';
        seq.forEach(item => {
            const img = document.createElement('img');
            img.src = item.src;
            img.className = 'image-card' + (item.size === 2 ? ' double-size' : '');
            img.onload = () => img.classList.add('loaded');
            container.appendChild(img);
        });
        startCountdown();
    }

    function startCountdown() {
        isPlayingSequence = false;
        countdownBeats = 4;
        currentSlotIndex = -1;
        currentCycleHits = 0;
        currentCycleMisses = 0;
        targetTimings = [];
        document.getElementById('feedbackDisplay').innerText = "WAIT...";
    }

    function playTick() {
        const spb = 60 / document.getElementById('bpmRange').value;
        const now = audioCtx.currentTime;

        if (countdownBeats > 0) {
            // Звук отсчета
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = countdownBeats === 1 ? 880 : 440;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.1);

            document.getElementById('feedbackDisplay').innerText = countdownBeats;
            countdownBeats--;
            if(countdownBeats === 0) isPlayingSequence = true;
            return;
        }

        if (isPlayingSequence && currentSlotIndex === 3) {
            if (currentCycleHits === expectedHits && currentCycleMisses === 0) {
                perfectStreak++; updateStarsUI(); roll(); return;
            } else {
                perfectStreak = 0; updateStarsUI();
            }
            currentCycleHits = 0; currentCycleMisses = 0;
        }

        currentSlotIndex = (currentSlotIndex + 1) % 4;
        document.getElementById('feedbackDisplay').innerText = "GO!";

        // Обычный звук такта
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = currentSlotIndex === 0 ? 880 : 440;
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.1);

        const cards = document.querySelectorAll('.image-card');
        cards.forEach(c => c.classList.remove('active-slot'));
        let acc = 0;
        currentSequence.forEach((item, idx) => {
            if (currentSlotIndex >= acc && currentSlotIndex < acc + item.size) {
                cards[idx].classList.add('active-slot');
                if (currentSlotIndex === acc) {
                    targetTimings = item.pattern.map(p => ({ time: now + (p * spb), cardIdx: idx }));
                }
            }
            acc += item.size;
        });
    }

    function scheduler() {
        if (!isRunning) return;
        while(nextBeatTime < audioCtx.currentTime + 0.1) {
            playTick();
            nextBeatTime += 60 / document.getElementById('bpmRange').value;
        }
        timerID = setTimeout(scheduler, 25);
    }

    function handleTap() {
        if (!isRunning || !isPlayingSequence) return;
        const now = audioCtx.currentTime;
        let isHit = false;

        for (let i = 0; i < targetTimings.length; i++) {
            const diff = Math.abs(now - (targetTimings[i].time + userOffset));
            if (diff < 0.2) {
                targetTimings.splice(i, 1);
                score += 100; currentCycleHits++; isHit = true;
                document.getElementById('feedbackDisplay').innerText = "PERFECT!";
                break;
            }
        }

        if (!isHit) {
            score = Math.max(0, score - 30); currentCycleMisses++;
            document.getElementById('feedbackDisplay').innerText = "MISS!";
            const active = document.querySelector('.active-slot');
            if (active) { active.classList.add('error-hit'); setTimeout(() => active.classList.remove('error-hit'), 300); }
        }
        document.getElementById('scoreDisplay').innerText = score;
    }

    document.getElementById('metronomeBtn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!isRunning) {
            isRunning = true; nextBeatTime = audioCtx.currentTime;
            roll(); scheduler(); this.innerText = "СТОП";
        } else { isRunning = false; clearTimeout(timerID); this.innerText = "СТАРТ"; }
    };

    document.getElementById('shuffleBtn').onclick = () => { if(isRunning) roll(); };
    document.getElementById('bpmRange').oninput = function() { document.getElementById('bpmValue').innerText = this.value + " BPM"; };
    document.getElementById('startGameBtn').onclick = () => { 
        document.getElementById('menuScreen').style.display = 'none'; 
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('currentLevelDisplay').innerText = currentLevel;
        perfectStreak = 0; lastStarsCount = 0; updateStarsUI();
    };
    document.getElementById('backBtn').onclick = () => { location.reload(); };
    
    const tapArea = document.getElementById('tapArea');
    tapArea.onmousedown = (e) => { e.preventDefault(); handleTap(); };
    tapArea.ontouchstart = (e) => { e.preventDefault(); handleTap(); };

    initLevels();
</script>
</body>
</html>
