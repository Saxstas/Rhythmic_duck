<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1e1e26;
            --accent-color: #00cec9;
            --error-color: #ff4757;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Шапка */
        .header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            z-index: 10;
        }

        .score-box {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #333;
            min-width: 80px;
            text-align: center;
        }

        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.1rem; font-weight: 800; display: block; }

        /* Игровое поле */
        .game-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 20px;
        }

        #feedback {
            font-size: 1.8rem;
            font-weight: 900;
            height: 40px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .cards-row {
            display: flex;
            gap: 10px;
            height: 120px;
            align-items: center;
            justify-content: center;
        }

        .card {
            height: 110px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.1s ease;
            position: relative;
        }

        .card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
        }

        .card.active {
            border-color: var(--accent-color);
            background: #252530;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 206, 201, 0.3);
        }

        .card.error {
            border-color: var(--error-color);
            background: rgba(255, 71, 87, 0.2);
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Кнопка тапа */
        .tap-area {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, var(--accent-color), #0984e3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }

        .tap-area:active { transform: scale(0.9); filter: brightness(1.2); }

        /* Меню */
        .controls {
            width: 100%;
            padding: 25px;
            background: #16161e;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-start { background: var(--accent-color); color: #000; }
        .btn-calib { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-box">
            <span class="label">Lvl</span>
            <span id="lvlVal" class="value">1</span>
        </div>
        <div class="score-box">
            <span class="label">Score</span>
            <span id="scoreVal" class="value">0</span>
        </div>
        <div class="score-box">
            <span class="label">Offset</span>
            <span id="offVal" class="value">0.000</span>
        </div>
    </div>

    <div class="game-zone">
        <div id="feedback">READY?</div>
        <div class="cards-row" id="cardsRow"></div>
        <div class="tap-area" id="mainBtn">TAP</div>
    </div>

    <div class="controls">
        <button class="btn btn-calib" onclick="startCalibration()">CALIBRATE</button>
        <button class="btn btn-start" onclick="startGame()">START</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // ТВОЯ БАЗА
    const levelPacks = { 1: [{ src: "Lvl1/s1.png", size: 1, pattern: [0] }, { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }], 2: [{ src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }], 3: [{ src: "Lvl3/4.png", size: 1, pattern: [] }, { src: "Lvl3/5.png", size: 1, pattern: [] }, { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }], 4: [{ src: "Lvl4/size2/9.png", size: 2, pattern: [0, 1, 1.5] }], 5: [{ src: "Lvl5/3.png", size: 1, pattern: [0.5] }], 6: [{ src: "Lvl6/Size2/7.png", size: 2, pattern: [0, 1.5] }, { src: "Lvl6/Size2/8.png", size: 2, pattern: [0, 0.5] }], 7: [{ src: "Lvl7/Size2/10.png", size: 2, pattern: [0.5, 1.5] }, { src: "Lvl7/Size2/11.png", size: 2, pattern: [0.5] }], 8: [{ src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }], 9: [{ src: "Lvl9/27.png", size: 1, pattern: [0, 0.5, 0.75] }, { src: "Lvl9/26.png", size: 1, pattern: [0, 0.25, 0.5] }], 10: [{ src: "Lvl10/13.png", size: 1, pattern: [0, 0.25, 0.50] }, { src: "Lvl10/15.png", size: 1, pattern: [0, 0.50, 0.75] }], 11: [{ src: "Lvl11/18.png", size: 1, pattern: [0.50, 0.75] }, { src: "Lvl11/19.png", size: 1, pattern: [0, 0.25] }], 12: [{ src: "Lvl12/25.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 13: [{ src: "Lvl13/14.png", size: 1, pattern: [0, 0.25, 0.75] }, { src: "Lvl13/31.png", size: 1, pattern: [0, 0.75] }], 14: [{ src: "Lvl14/20.png", size: 1, pattern: [0, 0.5] }], 15: [{ src: "Lvl15/17.png", size: 1, pattern: [0, 0.25] }, { src: "Lvl15/23.png", size: 1, pattern: [0, 0.75] }], 16: [{ src: "Lvl16/21.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 17: [{ src: "Lvl17/16.png", size: 1, pattern: [0.25, 0.75] }, { src: "Lvl17/33.png", size: 1, pattern: [0.25] }], 18: [{ src: "Lvl18/34.png", size: 1, pattern: [0.75] }], 19: [{ src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }] };

    let currentLvl = 1;
    let score = 0;
    let isRunning = false;
    let isPlaying = false;
    let nextBeat = 0;
    let slotIdx = -1;
    let userOff = parseFloat(localStorage.getItem('r_off') || '0');

    const bpm = 70;
    const spb = 60 / bpm;

    let targets = [];
    let sequence = [];
    let cycleHits = 0;
    let cycleMisses = 0;
    let expectedHits = 0;

    function init() {
        document.getElementById('offVal').innerText = userOff.toFixed(3);
        const btn = document.getElementById('mainBtn');
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
        btn.addEventListener('mousedown', handleTap);
        generate();
    }

    function generate() {
        const row = document.getElementById('cardsRow');
        row.innerHTML = '';
        sequence = [];
        expectedHits = 0;
        let filled = 0;
        const pack = levelPacks[currentLvl] || levelPacks[1];

        while(filled < 4) {
            let item = pack[Math.floor(Math.random() * pack.length)];
            if (filled + item.size > 4) item = pack.find(p => p.size === 1) || pack[0];

            const card = { ...item, start: filled };
            sequence.push(card);

            const el = document.createElement('div');
            el.className = 'card';
            el.id = `c-${filled}`;
            el.style.width = item.size === 2 ? '170px' : '80px';
            el.innerHTML = `<img src="${item.src}" onerror="this.style.opacity='0.2'">`;
            row.appendChild(el);

            expectedHits += item.pattern.length;
            filled += item.size;
        }
    }

    function startGame() {
        if (isRunning) return;
        audioCtx.resume();
        isRunning = true;
        score = 0;
        slotIdx = -1;
        isPlaying = false;
        nextBeat = audioCtx.currentTime + 0.1;
        updateFeedback("READY", "#fff");
        loop();
    }

    function loop() {
        if (!isRunning) return;
        while (nextBeat < audioCtx.currentTime + 0.1) {
            tick(nextBeat);
            nextBeat += spb;
        }
        requestAnimationFrame(loop);
    }

    function tick(t) {
        slotIdx++;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

        if (slotIdx >= 0 && slotIdx < 4) {
            const currentCard = sequence.find(c => slotIdx >= c.start && slotIdx < c.start + c.size);
            if (currentCard) document.getElementById(`c-${currentCard.start}`).classList.add('active');

            if (isPlaying) {
                const cardStarted = sequence.find(c => c.start === slotIdx);
                if (cardStarted) {
                    cardStarted.pattern.forEach(p => {
                        targets.push({ time: t + (p * spb), id: `c-${cardStarted.start}` });
                    });
                }
            }
        }

        // Звук метронома
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = slotIdx === 0 ? 800 : 400;
        g.gain.setValueAtTime(0.05, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);

        if (slotIdx === 3) {
            if (!isPlaying) {
                isPlaying = true;
                slotIdx = -1;
                updateFeedback("GO!", var(--accent-color));
            } else {
                setTimeout(checkCycle, 200);
            }
        }
    }

    function checkCycle() {
        if (cycleMisses === 0 && cycleHits >= expectedHits) {
            updateFeedback("PERFECT!", "#f1c40f");
            if (currentLvl < 19) currentLvl++;
            document.getElementById('lvlVal').innerText = currentLvl;
            generate();
        }
        cycleHits = 0; cycleMisses = 0; slotIdx = -1; isPlaying = false;
    }

    function handleTap() {
        if (!isRunning || !isPlaying) return;
        const now = audioCtx.currentTime;
        let hit = false;

        for (let i = 0; i < targets.length; i++) {
            const diff = Math.abs(now - (targets[i].time + userOff));
            if (diff < 0.2) {
                targets.splice(i, 1);
                score += 100; cycleHits++; hit = true;
                updateFeedback("HIT!", var(--accent-color));
                break;
            }
        }

        if (!hit) {
            cycleMisses++;
            updateFeedback("MISS!", var(--error-color));
            const active = sequence.find(c => slotIdx >= c.start && slotIdx < c.start + c.size);
            if (active) {
                const el = document.getElementById(`c-${active.start}`);
                el.classList.add('error');
                setTimeout(() => el.classList.remove('error'), 300);
            }
        }
        document.getElementById('scoreVal').innerText = score;
    }

    function updateFeedback(t, c) {
        const f = document.getElementById('feedback');
        f.innerText = t; f.style.color = c;
    }

    function startCalibration() {
        // Упрощенная калибровка - обнуление
        userOff = 0;
        localStorage.setItem('r_off', 0);
        location.reload();
    }

    init();
</script>
</body>
</html>
