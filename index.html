<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1e1e26;
            --accent-color: #00cec9;
            --error-color: #ff4757;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Панель настроек и выбора уровня */
        .top-menu {
            width: 100%;
            background: #16161e;
            padding: 10px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        select, input[type="range"] {
            background: #2d2d3a;
            color: white;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 5px;
        }

        .stat-row {
            width: 90%;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .score-box {
            background: var(--card-bg);
            padding: 5px 12px;
            border-radius: 10px;
            text-align: center;
            min-width: 60px;
        }

        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1rem; font-weight: 800; display: block; }

        /* Игровое поле */
        .game-zone {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #feedback {
            font-size: 1.5rem;
            font-weight: 900;
            height: 30px;
            margin-bottom: 20px;
        }

        .cards-row {
            display: flex;
            gap: 10px;
            height: 120px;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .card {
            height: 100px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: 0.1s;
        }

        .card img { max-width: 85%; max-height: 85%; }
        .card.active { border-color: var(--accent-color); background: #252530; transform: scale(1.05); }
        .card.error { border-color: var(--error-color); animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .tap-area {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--accent-color), #0984e3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            user-select: none;
        }

        /* Кнопки управления */
        .controls {
            width: 100%;
            padding: 20px;
            background: #16161e;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-start { background: var(--accent-color); color: #000; }
        .btn-calib { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="top-menu">
    <div>
        <span class="label">Level:</span>
        <select id="levelSelect" onchange="changeLevel(this.value)">
            </select>
    </div>
    <div>
        <span class="label">BPM: <span id="bpmDisplay">70</span></span><br>
        <input type="range" id="bpmSlider" min="40" max="180" value="70" oninput="updateBPM(this.value)">
    </div>
</div>

<div class="stat-row">
    <div class="score-box"><span class="label">Score</span><span id="scoreVal" class="value">0</span></div>
    <div class="score-box"><span class="label">Offset</span><span id="offVal" class="value">0.000</span></div>
</div>

<div class="game-zone">
    <div id="feedback">READY?</div>
    <div class="cards-row" id="cardsRow"></div>
    <div class="tap-area" id="mainBtn">TAP</div>
</div>

<div class="controls">
    <button class="btn btn-calib" onclick="startCalibration()">CALIBRATE</button>
    <button class="btn btn-start" onclick="startGame()">START</button>
    <button class="btn btn-calib" onclick="stopGame()">STOP</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let audioCtx;

    // ТВОЯ БАЗА ДАННЫХ
    const levelPacks = { 1: [{ src: "Lvl1/s1.png", size: 1, pattern: [0] }, { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }], 2: [{ src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }], 3: [{ src: "Lvl3/4.png", size: 1, pattern: [] }, { src: "Lvl3/5.png", size: 1, pattern: [] }, { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }], 4: [{ src: "Lvl4/size2/9.png", size: 2, pattern: [0, 1, 1.5] }], 5: [{ src: "Lvl5/3.png", size: 1, pattern: [0.5] }], 6: [{ src: "Lvl6/Size2/7.png", size: 2, pattern: [0, 1.5] }, { src: "Lvl6/Size2/8.png", size: 2, pattern: [0, 0.5] }], 7: [{ src: "Lvl7/Size2/10.png", size: 2, pattern: [0.5, 1.5] }, { src: "Lvl7/Size2/11.png", size: 2, pattern: [0.5] }], 8: [{ src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }], 9: [{ src: "Lvl9/27.png", size: 1, pattern: [0, 0.5, 0.75] }, { src: "Lvl9/26.png", size: 1, pattern: [0, 0.25, 0.5] }], 10: [{ src: "Lvl10/13.png", size: 1, pattern: [0, 0.25, 0.50] }, { src: "Lvl10/15.png", size: 1, pattern: [0, 0.50, 0.75] }], 11: [{ src: "Lvl11/18.png", size: 1, pattern: [0.50, 0.75] }, { src: "Lvl11/19.png", size: 1, pattern: [0, 0.25] }], 12: [{ src: "Lvl12/25.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 13: [{ src: "Lvl13/14.png", size: 1, pattern: [0, 0.25, 0.75] }, { src: "Lvl13/31.png", size: 1, pattern: [0, 0.75] }], 14: [{ src: "Lvl14/20.png", size: 1, pattern: [0, 0.5] }], 15: [{ src: "Lvl15/17.png", size: 1, pattern: [0, 0.25] }, { src: "Lvl15/23.png", size: 1, pattern: [0, 0.75] }], 16: [{ src: "Lvl16/21.png", size: 1, pattern: [0.25, 0.5, 0.75] }], 17: [{ src: "Lvl17/16.png", size: 1, pattern: [0.25, 0.75] }, { src: "Lvl17/33.png", size: 1, pattern: [0.25] }], 18: [{ src: "Lvl18/34.png", size: 1, pattern: [0.75] }], 19: [{ src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }] };

    let currentLvl = 1;
    let bpm = 70;
    let score = 0;
    let isRunning = false;
    let isPlaying = false;
    let nextBeatTime = 0;
    let slotIdx = -1;
    let userOffset = parseFloat(localStorage.getItem('r_off') || '0');

    let targets = [];
    let sequence = [];
    let hitsInCycle = 0;
    let expectedInCycle = 0;

    function init() {
        // Заполняем выбор уровней
        const select = document.getElementById('levelSelect');
        Object.keys(levelPacks).forEach(lvl => {
            const opt = document.createElement('option');
            opt.value = lvl; opt.innerText = "Level " + lvl;
            select.appendChild(opt);
        });

        document.getElementById('offVal').innerText = userOffset.toFixed(3);
        const btn = document.getElementById('mainBtn');
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
        btn.addEventListener('mousedown', handleTap);
        generateLevel();
    }

    function updateBPM(val) {
        bpm = parseInt(val);
        document.getElementById('bpmDisplay').innerText = bpm;
    }

    function changeLevel(val) {
        currentLvl = parseInt(val);
        stopGame();
        generateLevel();
    }

    function generateLevel() {
        const row = document.getElementById('cardsRow');
        row.innerHTML = '';
        sequence = [];
        expectedInCycle = 0;
        let filled = 0;
        const pack = levelPacks[currentLvl];

        while(filled < 4) {
            let item = pack[Math.floor(Math.random() * pack.length)];
            if (filled + item.size > 4) item = pack.find(p => p.size === 1) || pack[0];

            sequence.push({ ...item, startSlot: filled });
            const el = document.createElement('div');
            el.className = 'card';
            el.id = `c-${filled}`;
            el.style.width = item.size === 2 ? '170px' : '80px';
            el.innerHTML = `<img src="${item.src}" onerror="this.style.opacity='0.2'">`;
            row.appendChild(el);
            expectedInCycle += item.pattern.length;
            filled += item.size;
        }
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function startGame() {
        initAudio();
        if (isRunning) return;
        isRunning = true;
        score = 0;
        slotIdx = -1;
        isPlaying = false;
        nextBeatTime = audioCtx.currentTime + 0.1;
        updateFeedback("READY", "#fff");
        loop();
    }

    function stopGame() {
        isRunning = false;
        isPlaying = false;
        targets = [];
        updateFeedback("STOPPED", "#888");
    }

    function loop() {
        if (!isRunning) return;
        const spb = 60 / bpm;
        while (nextBeatTime < audioCtx.currentTime + 0.1) {
            processTick(nextBeatTime, spb);
            nextBeatTime += spb;
        }
        requestAnimationFrame(loop);
    }

    function processTick(t, spb) {
        slotIdx++;
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

        if (slotIdx >= 0 && slotIdx < 4) {
            const activeCard = sequence.find(c => slotIdx >= c.startSlot && slotIdx < c.startSlot + c.size);
            if (activeCard) document.getElementById(`c-${activeCard.startSlot}`).classList.add('active');

            if (isPlaying) {
                const cardStarted = sequence.find(c => c.startSlot === slotIdx);
                if (cardStarted) {
                    cardStarted.pattern.forEach(p => {
                        targets.push({ time: t + (p * spb), id: `c-${cardStarted.startSlot}` });
                    });
                }
            }
        }

        playClick(t, slotIdx === 0 ? 880 : 440);

        if (slotIdx === 3) {
            if (!isPlaying) {
                isPlaying = true;
                slotIdx = -1;
                updateFeedback("GO!", "#00cec9");
            } else {
                setTimeout(validateCycle, 150);
            }
        }
    }

    function validateCycle() {
        if (hitsInCycle >= expectedInCycle) {
            updateFeedback("PERFECT!", "#f1c40f");
            generateLevel();
        }
        hitsInCycle = 0; slotIdx = -1; isPlaying = false; targets = [];
    }

    function handleTap() {
        if (!isRunning || !isPlaying) return;
        const now = audioCtx.currentTime;
        let hit = false;

        for (let i = 0; i < targets.length; i++) {
            const diff = Math.abs(now - (targets[i].time + userOffset));
            if (diff < 0.2) {
                targets.splice(i, 1);
                score += 100; hitsInCycle++; hit = true;
                updateFeedback("HIT!", "#00cec9");
                break;
            }
        }

        if (!hit) {
            updateFeedback("MISS!", "#ff4757");
            const active = sequence.find(c => slotIdx >= c.startSlot && slotIdx < c.startSlot + c.size);
            if (active) {
                const el = document.getElementById(`c-${active.startSlot}`);
                el.classList.add('error');
                setTimeout(() => el.classList.remove('error'), 300);
            }
        }
        document.getElementById('scoreVal').innerText = score;
    }

    function playClick(t, f) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = f;
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.start(t); osc.stop(t + 0.05);
    }

    function startCalibration() {
        initAudio();
        userOffset = 0;
        let samples = [];
        updateFeedback("TAP 4 TIMES", "#f1c40f");
        // Простая калибровка: первые 4 тапа записывают разницу
        const calibHandler = () => {
            samples.push(audioCtx.currentTime - nextBeatTime);
            if (samples.length >= 4) {
                userOffset = samples.reduce((a,b)=>a+b)/4;
                localStorage.setItem('r_off', userOffset);
                document.getElementById('offVal').innerText = userOffset.toFixed(3);
                window.removeEventListener('mousedown', calibHandler);
                updateFeedback("DONE!", "#00cec9");
            }
        };
        window.addEventListener('mousedown', calibHandler);
        startGame();
    }

    function updateFeedback(t, c) {
        const f = document.getElementById('feedback');
        f.innerText = t; f.style.color = c;
    }

    init();
</script>
</body>
</html>
