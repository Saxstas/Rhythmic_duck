<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Master Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; text-align: center; background-color: #1a1a2e; color: #ffffff; margin: 0; padding: 10px; overflow: hidden; user-select: none; touch-action: none; }
        .main-container { width: 100%; max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; color: #00cec9; text-transform: uppercase; margin: 5px 0 5px 0; letter-spacing: 2px; }
        .screen { display: none; }
        #menuScreen { display: block; }
        
        /* РЕЙТИНГ И ЗВЕЗДЫ */
        .rank-box { background: linear-gradient(135deg, rgba(0, 206, 201, 0.1), rgba(9, 132, 227, 0.1)); border: 1px solid rgba(0, 206, 201, 0.3); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .rank-title { font-weight: bold; color: #00cec9; }
        .total-stars { color: #fdcb6e; font-weight: bold; }
        
        .levels-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .level-btn { background: #2d2d44; color: white; border: 1px solid #3d3d5c; padding: 8px 0; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; }
        .level-btn.active { background: #00cec9; color: #1a1a2e; border-color: #00cec9; box-shadow: 0 0 15px rgba(0, 206, 201, 0.5); }
        .level-stars { font-size: 10px; color: #fdcb6e; }

        .primary-btn { background: linear-gradient(135deg, #00cec9, #0984e3); color: white; font-weight: bold; width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; border: none; margin-bottom: 10px; cursor: pointer; }
        .secondary-btn { background: #2d2d44; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        .stars-display { font-size: 1.2rem; display: flex; gap: 4px; }
        .star-item { color: rgba(255, 255, 255, 0.15); transition: all 0.3s; }
        .star-item.filled { color: #fdcb6e; text-shadow: 0 0 8px rgba(253, 203, 110, 0.6); }
        .star-pop { animation: starPop 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        @keyframes starPop { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

        .grid { display: flex; justify-content: center; align-items: center; gap: 8px; min-height: 140px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 2px solid #2d2d44; }
        .image-card { width: 20vw; height: 20vw; max-width: 80px; max-height: 80px; object-fit: cover; border-radius: 10px; border: 3px solid #3d3d5c; opacity: 0; transition: 0.1s; background: #2d2d44; display: none; }
        .image-card.loaded { opacity: 1; }
        .image-card.double-size { width: 42vw; max-width: 170px; }
        .active-slot { border-color: #00cec9 !important; transform: scale(1.05); }
        .error-hit { border-color: #ff4757 !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* ЗОНА ТАПА И КАЛИБРОВКА */
        .tap-area { background: rgba(0, 206, 201, 0.05); border: 2px dashed #00cec9; border-radius: 15px; height: 100px; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; color: #00cec9; font-weight: bold; cursor: pointer; transition: 0.1s; touch-action: none; }
        .tap-area.active-tap { background: rgba(0, 206, 201, 0.2); transform: scale(0.98); border: 2px solid #00cec9; }
        
        #calibProgress { font-size: 1.5rem; color: #fdcb6e; margin: 20px 0; font-weight: bold; min-height: 2em; }
        #calibValueDisplay { margin-bottom: 20px; color: #a4b0be; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-container">
    <div id="menuScreen" class="screen">
        <h1>RHYTHM MASTER</h1>
        <div class="rank-box">
            <div>Ранг: <span class="rank-title" id="playerRank">Новичок</span></div>
            <div class="total-stars" id="totalStarsDisplay">★ 0</div>
        </div>
        <div class="levels-container" id="levelsGrid"></div>
        <button id="startGameBtn" class="primary-btn">ИГРАТЬ</button>
        <button id="calibOpenBtn" class="secondary-btn">⚙️ НАСТРОЙКА ЗАДЕРЖКИ</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="nav-header">
            <button id="backBtn" class="secondary-btn" style="width:auto; margin:0">← МЕНЮ</button>
            <div class="stars-display" id="gameStarsDisplay"></div>
            <h1 style="margin:0; font-size: 1rem;">LVL <span id="currentLevelDisplay">1</span></h1>
        </div>
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <div style="color:#fdcb6e; font-weight:bold">SCORE: <span id="scoreDisplay">0</span></div>
            <div id="feedbackDisplay" style="color:#00cec9; font-weight:bold">READY</div>
        </div>
        <button id="shuffleBtn" class="primary-btn" style="padding: 10px; font-size: 14px;">ПЕРЕМЕШАТЬ КАРТЫ</button>
        
        <div id="imageContainer" class="grid">
            <img class="image-card">
            <img class="image-card">
            <img class="image-card">
            <img class="image-card">
        </div>

        <div id="tapArea" class="tap-area">ТАПАЙ В РИТМ</div>
        <div style="margin-top:15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px;">
            <button id="metronomeBtn" class="primary-btn" style="margin:0">СТАРТ</button>
            <input type="range" id="bpmRange" min="60" max="180" value="120" style="width:100%; margin: 10px 0;">
            <div id="bpmValue">120 BPM</div>
        </div>
    </div>

    <div id="calibrationScreen" class="screen">
        <h1>КАЛИБРОВКА</h1>
        <p style="font-size: 0.8rem; color: #a4b0be;">Мы установим 70 BPM для точности.<br>Сначала 4 удара отсчета, затем тапайте в такт.</p>
        <div id="calibProgress">НАЖМИТЕ НАЧАТЬ</div>
        <div id="calibTapArea" class="tap-area" style="margin-bottom: 15px;">ТАПАЙ В ТАКТ</div>
        <div id="calibValueDisplay">Задержка: --</div>
        <button id="calibStartBtn" class="primary-btn">НАЧАТЬ</button>
        <button id="calibBackBtn" class="secondary-btn">← ГОТОВО / В МЕНЮ</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const levelPacks = {
        1: [{ src: "Lvl1/s1.png", size: 1, pattern: [0] }, { src: "Lvl1/Size2/6.png", size: 2, pattern: [0] }],
        2: [{ src: "lvl2/2.png", size: 1, pattern: [0, 0.5] }],
        3: [{ src: "Lvl3/4.png", size: 1, pattern: [] }, { src: "Lvl3/5.png", size: 1, pattern: [] }, { src: "Lvl3/Size2/30.png", size: 2, pattern: [] }],
        4: [{ src: "Lvl4/size2/9.png", size: 2, pattern: [0, 1, 1.5] }],
        5: [{ src: "Lvl5/3.png", size: 1, pattern: [0.5] }],
        6: [{ src: "Lvl6/Size2/7.png", size: 2, pattern: [0, 1.5] }, { src: "Lvl6/Size2/8.png", size: 2, pattern: [0, 0.5] }],
        7: [{ src: "Lvl7/Size2/10.png", size: 2, pattern: [0.5, 1.5] }, { src: "Lvl7/Size2/11.png", size: 2, pattern: [0.5] }],
        8: [{ src: "Lvl8/24.png", size: 1, pattern: [0, 0.25, 0.5, 0.75] }],
        9: [{ src: "Lvl9/27.png", size: 1, pattern: [0, 0.5, 0.75] }, { src: "Lvl9/26.png", size: 1, pattern: [0, 0.25, 0.5] }],
        10: [{ src: "Lvl10/13.png", size: 1, pattern: [0, 0.25, 0.50] }, { src: "Lvl10/15.png", size: 1, pattern: [0, 0.50, 0.75] }],
        11: [{ src: "Lvl11/18.png", size: 1, pattern: [0.50, 0.75] }, { src: "Lvl11/19.png", size: 1, pattern: [0, 0.25] }],
        12: [{ src: "Lvl12/25.png", size: 1, pattern: [0.25, 0.5, 0.75] }],
        13: [{ src: "Lvl13/14.png", size: 1, pattern: [0, 0.25, 0.75] }, { src: "Lvl13/31.png", size: 1, pattern: [0, 0.75] }],
        14: [{ src: "Lvl14/20.png", size: 1, pattern: [0, 0.5] }],
        15: [{ src: "Lvl15/17.png", size: 1, pattern: [0, 0.25] }, { src: "Lvl15/23.png", size: 1, pattern: [0, 0.75] }],
        16: [{ src: "Lvl16/21.png", size: 1, pattern: [0.25, 0.5, 0.75] }],
        17: [{ src: "Lvl17/16.png", size: 1, pattern: [0.25, 0.75] }, { src: "Lvl17/33.png", size: 1, pattern: [0.25] }],
        18: [{ src: "Lvl18/34.png", size: 1, pattern: [0.75] }],
        19: [{ src: "Lvl19/12.png", size: 1, pattern: [0, 0.33, 0.66] }]
    };

    let currentLevel = 1, score = 0, currentSlotIndex = -1;
    let targetTimings = [], isRunning = false, audioCtx, nextBeatTime, timerID;
    let expectedHits = 0, currentCycleHits = 0, currentCycleMisses = 0;
    let perfectStreak = 0, lastStarsCount = 0;
    let countdownBeats = 0, isPlayingSequence = false;
    let currentSequence = [];
    
    // Переменные для калибровки
    let userOffset = parseFloat(localStorage.getItem('rhythm_offset')) || 0.15;
    let calibrationData = [], isCalibrating = false, lastBeatStartTime = 0;

    let levelStars = JSON.parse(localStorage.getItem('rhythm_stars')) || {};

    // --- НАВИГАЦИЯ И ИНТЕРФЕЙС ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function updateRank() {
        let total = Object.values(levelStars).reduce((a, b) => a + b, 0);
        document.getElementById('totalStarsDisplay').innerText = `★ ${total}`;
        let rank = "Новичок", color = "#a4b0be";
        if (total >= 40) { rank = "Бог Ритма"; color = "#ff4757"; }
        else if (total >= 25) { rank = "Мастер"; color = "#fdcb6e"; }
        else if (total >= 10) { rank = "Профи"; color = "#00cec9"; }
        const rEl = document.getElementById('playerRank');
        rEl.innerText = rank; rEl.style.color = color;
    }

    function initLevels() {
        updateRank();
        const grid = document.getElementById('levelsGrid');
        grid.innerHTML = '';
        for(let i=1; i<=19; i++) {
            const b = document.createElement('button');
            const stars = levelStars[i] || 0;
            b.className = 'level-btn' + (i === currentLevel ? ' active' : '');
            b.innerHTML = `<span>${i}</span><span class="level-stars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</span>`;
            b.onclick = () => { currentLevel = i; initLevels(); };
            grid.appendChild(b);
        }
    }

    function updateStarsUI() {
        const display = document.getElementById('gameStarsDisplay');
        let currentStars = perfectStreak >= 5 ? 3 : (perfectStreak >= 2 ? 2 : (perfectStreak >= 1 ? 1 : 0));
        display.innerHTML = '';
        for(let s=0; s<3; s++) {
            const span = document.createElement('span');
            span.className = 'star-item' + (s < currentStars ? ' filled' : '');
            if (s < currentStars && s >= lastStarsCount) span.classList.add('star-pop');
            span.innerText = '★';
            display.appendChild(span);
        }
        if (currentStars > (levelStars[currentLevel] || 0)) {
            levelStars[currentLevel] = currentStars;
            localStorage.setItem('rhythm_stars', JSON.stringify(levelStars));
        }
        lastStarsCount = currentStars;
    }

    // --- ИГРОВАЯ МЕХАНИКА ---
    function stopMetronome() {
        isRunning = false;
        isPlayingSequence = false;
        clearTimeout(timerID);
        document.getElementById('metronomeBtn').innerText = "СТАРТ";
        document.querySelectorAll('.image-card').forEach(c => c.classList.remove('active-slot'));
        targetTimings = [];
    }

    function roll() {
        const pool = [];
        for(let i=1; i<=currentLevel; i++) if(levelPacks[i]) pool.push(...levelPacks[i]);
        let seq = [], total = 0;
        while(total < 4) {
            let item = pool[Math.floor(Math.random() * pool.length)];
            if(total + item.size <= 4) { seq.push(item); total += item.size; }
        }
        currentSequence = seq;
        expectedHits = seq.reduce((s, i) => s + i.pattern.length, 0);

        // Оптимизированный рендер без перегрузки DOM
        const images = document.querySelectorAll('#imageContainer .image-card');
        images.forEach(img => {
            img.style.display = 'none';
            img.classList.remove('loaded');
            img.classList.remove('active-slot');
        });

        seq.forEach((item, idx) => {
            const img = images[idx];
            img.src = item.src;
            img.className = 'image-card' + (item.size === 2 ? ' double-size' : '');
            img.style.display = 'block';
            img.onload = () => img.classList.add('loaded');
        });

        startCountdown();
    }

    function startCountdown() {
        isPlayingSequence = false;
        countdownBeats = 4;
        currentSlotIndex = -1;
        currentCycleHits = 0;
        currentCycleMisses = 0;
        targetTimings = [];
        if(!isCalibrating) {
            // Подсказка статуса, если перемешивали во время паузы
            document.getElementById('feedbackDisplay').innerText = isRunning ? "WAIT..." : "READY";
        }
    }

    function playTick() {
        const bpm = isCalibrating ? 70 : document.getElementById('bpmRange').value;
        const spb = 60 / bpm;
        const now = audioCtx.currentTime;

        if (countdownBeats > 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = countdownBeats === 1 ? 880 : 440;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.1);

            if(isCalibrating) {
                document.getElementById('calibProgress').innerText = `ОТСЧЕТ: ${countdownBeats}`;
            } else {
                document.getElementById('feedbackDisplay').innerText = countdownBeats;
            }
            
            countdownBeats--;
            if(countdownBeats === 0) isPlayingSequence = true;
            return;
        }

        if (!isCalibrating && isPlayingSequence && currentSlotIndex === 3) {
            if (currentCycleHits === expectedHits && currentCycleMisses === 0) {
                perfectStreak++; updateStarsUI(); roll(); return;
            } else {
                perfectStreak = 0; updateStarsUI();
            }
            currentCycleHits = 0; currentCycleMisses = 0;
        }

        currentSlotIndex = (currentSlotIndex + 1) % 4;
        lastBeatStartTime = now; 

        if(!isCalibrating) document.getElementById('feedbackDisplay').innerText = "GO!";

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = currentSlotIndex === 0 ? 880 : 440;
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.1);

        if (!isCalibrating) {
            const cards = document.querySelectorAll('.image-card');
            cards.forEach(c => c.classList.remove('active-slot'));
            let acc = 0;
            currentSequence.forEach((item, idx) => {
                if (currentSlotIndex >= acc && currentSlotIndex < acc + item.size) {
                    cards[idx].classList.add('active-slot');
                    if (currentSlotIndex === acc) {
                        targetTimings = item.pattern.map(p => ({ time: now + (p * spb), cardIdx: idx }));
                    }
                }
                acc += item.size;
            });
        }
    }

    function scheduler() {
        if (!isRunning) return;
        while(nextBeatTime < audioCtx.currentTime + 0.1) {
            playTick();
            const bpm = isCalibrating ? 70 : document.getElementById('bpmRange').value;
            nextBeatTime += 60 / bpm;
        }
        timerID = setTimeout(scheduler, 25);
    }

    function handleTap(areaId) {
        if (!isRunning || !isPlayingSequence) return;
        const now = audioCtx.currentTime;

        const btn = document.getElementById(areaId);
        btn.classList.add('active-tap');
        setTimeout(() => btn.classList.remove('active-tap'), 100);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

        if (isCalibrating) {
            let diff = now - lastBeatStartTime;
            const spb = 60 / 70;
            if (diff > spb / 2) diff -= spb; 
            calibrationData.push(diff);
            
            document.getElementById('calibProgress').innerText = `ЗАПИСЬ: ${calibrationData.length} / 10`;
            
            if (calibrationData.length >= 10) {
                userOffset = calibrationData.reduce((a,b) => a+b, 0) / 10;
                localStorage.setItem('rhythm_offset', userOffset);
                document.getElementById('calibValueDisplay').innerText = `Задержка: ${userOffset.toFixed(3)}s`;
                document.getElementById('calibProgress').innerText = "ГОТОВО!";
                stopMetronome();
                isCalibrating = false;
            }
            return;
        }

        let isHit = false;
        let hitQuality = "";
        const feedbackEl = document.getElementById('feedbackDisplay');

        for (let i = 0; i < targetTimings.length; i++) {
            const diff = Math.abs(now - (targetTimings[i].time + userOffset));
            
            if (diff <= 0.20) { // Новое окно PERFECT (0.20s)
                targetTimings.splice(i, 1);
                score += 100; 
                currentCycleHits++; 
                isHit = true;
                hitQuality = "PERFECT!";
                feedbackEl.style.color = "#00cec9";
                break;
            } else if (diff <= 0.45) { // Новое окно GOOD (0.45s)
                targetTimings.splice(i, 1);
                score += 50; 
                currentCycleHits++; 
                isHit = true;
                hitQuality = "GOOD";
                feedbackEl.style.color = "#fdcb6e";
                break;
            }
        }

        if (isHit) {
            feedbackEl.innerText = hitQuality;
        } else {
            score = Math.max(0, score - 30); 
            currentCycleMisses++;
            feedbackEl.innerText = "MISS!";
            feedbackEl.style.color = "#ff4757";
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            const active = document.querySelector('.active-slot');
            if (active) { 
                active.classList.add('error-hit'); 
                setTimeout(() => active.classList.remove('error-hit'), 300); 
            }
        }
        document.getElementById('scoreDisplay').innerText = score;
    }

    // --- СОБЫТИЯ КНОПОК ---
    document.getElementById('startGameBtn').onclick = () => { 
        showScreen('gameScreen');
        document.getElementById('currentLevelDisplay').innerText = currentLevel;
        perfectStreak = 0; lastStarsCount = 0; updateStarsUI();
    };

    document.getElementById('calibOpenBtn').onclick = () => { 
        showScreen('calibrationScreen');
        document.getElementById('calibValueDisplay').innerText = `Текущая задержка: ${userOffset.toFixed(3)}s`;
        document.getElementById('calibProgress').innerText = "ГОТОВ К ТЕСТУ";
    };

    document.getElementById('calibBackBtn').onclick = () => { 
        stopMetronome(); isCalibrating = false; initLevels(); showScreen('menuScreen'); 
    };

    document.getElementById('calibStartBtn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        calibrationData = []; 
        isCalibrating = true;
        
        if (!isRunning) {
            isRunning = true; 
            nextBeatTime = audioCtx.currentTime; 
            startCountdown(); 
            scheduler();
        }
    };

    document.getElementById('backBtn').onclick = () => { stopMetronome(); initLevels(); showScreen('menuScreen'); };

    document.getElementById('metronomeBtn').onclick = function() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Оптимизация мгновенного старта на мобильных
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (!isRunning) {
            isRunning = true; nextBeatTime = audioCtx.currentTime;
            roll(); scheduler(); this.innerText = "СТОП";
        } else { stopMetronome(); }
    };

    // Теперь тасует в любое время
    document.getElementById('shuffleBtn').onclick = () => { roll(); };
    
    document.getElementById('bpmRange').oninput = function() { document.getElementById('bpmValue').innerText = this.value + " BPM"; };

    function bindFastTap(element, areaId) {
        element.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleTap(areaId);
        }, { passive: false });
    }

    bindFastTap(tapArea, 'tapArea');
    bindFastTap(calibTapArea, 'calibTapArea');

    initLevels();
</script>
</body>
</html>
