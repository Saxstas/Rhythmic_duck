<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rhythm Master - Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #00cec9;
            --error-color: #ff4757;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .cards-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .card {
            width: 70px;
            height: 100px;
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid transparent;
            transition: transform 0.1s, border-color 0.2s, background-color 0.2s;
            position: relative;
        }

        .card.active {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .card.error {
            background-color: rgba(255, 71, 87, 0.3);
            border-color: var(--error-color);
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .note-icon { font-size: 2.5rem; }
        .note-sub { font-size: 0.8rem; margin-top: 5px; opacity: 0.7; }

        #feedback {
            height: 40px;
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #tap-zone {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 206, 201, 0.2);
            cursor: pointer;
        }

        #tap-zone:active { transform: scale(0.95); opacity: 0.8; }

        .controls { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #444;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #calibration-panel {
            position: fixed;
            top: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="calibration-panel">
    <div id="calibProgress">Задержка: <span id="calibValueDisplay">0.000s</span></div>
    <button onclick="startCalibration()">Калибровка</button>
</div>

<div id="game-container">
    <div class="stats-panel">
        <div>SCORE: <span id="scoreDisplay">0</span></div>
        <div>BEST: <span id="bestScoreDisplay">0</span></div>
    </div>

    <div id="feedback">READY?</div>

    <div class="cards-row" id="cardsRow">
        </div>

    <div id="tap-zone" onmousedown="handleTap()" ontouchstart="handleTap(event)">
        TAP
    </div>

    <div class="controls">
        <button onclick="startGame()">START</button>
        <button onclick="stopMetronome()">STOP</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Состояние игры
    let isRunning = false;
    let isPlayingSequence = false;
    let currentSlotIndex = 0;
    let nextBeatTime = 0;
    let score = 0;
    let currentLevel = 1;
    let levelHighScores = JSON.parse(localStorage.getItem('rhythm_high_scores') || '{}');
    
    // Ритм
    const bpm = 70;
    const secondsPerBeat = 60 / bpm;
    
    // Калибровка
    let userOffset = parseFloat(localStorage.getItem('rhythm_offset') || '0');
    let isCalibrating = false;
    let calibrationData = [];
    let lastBeatStartTime = 0;

    // Логика карточек
    let currentSequence = [];
    let targetTimings = [];
    let expectedHits = 0;
    let currentCycleHits = 0;
    let currentCycleMisses = 0;
    let perfectStreak = 0;

    const CARD_TYPES = {
        NOTE: { icon: '♩', sub: '1 удар', hits: 1 },
        REST: { icon: '∑', sub: 'пауза', hits: 0 },
        DOUBLE: { icon: '♫', sub: '2 удара', hits: 2 }
    };

    function initCards() {
        const row = document.getElementById('cardsRow');
        row.innerHTML = '';
        for(let i=0; i<4; i++) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card-${i}`;
            row.appendChild(div);
        }
    }

    function roll() {
        currentSequence = [];
        expectedHits = 0;
        const row = document.getElementById('cardsRow');
        
        for(let i=0; i<4; i++) {
            const keys = Object.keys(CARD_TYPES);
            const typeKey = keys[Math.floor(Math.random() * keys.length)];
            const type = CARD_TYPES[typeKey];
            
            currentSequence.push(typeKey);
            expectedHits += type.hits;
            
            const card = document.getElementById(`card-${i}`);
            card.className = 'card';
            card.innerHTML = `<div class="note-icon">${type.icon}</div><div class="note-sub">${type.sub}</div>`;
        }
    }

    function startCalibration() {
        isCalibrating = true;
        calibrationData = [];
        startGame();
        updateFeedback("ЖМИ В ТАКТ!", "#00cec9");
    }

    function startGame() {
        if (isRunning) return;
        audioCtx.resume();
        isRunning = true;
        score = 0;
        document.getElementById('scoreDisplay').innerText = "0";
        document.getElementById('bestScoreDisplay').innerText = levelHighScores[currentLevel] || 0;
        
        nextBeatTime = audioCtx.currentTime + 0.1;
        currentSlotIndex = 0;
        
        roll();
        startCountdown();
        scheduler();
    }

    function stopMetronome() {
        isRunning = false;
        isPlayingSequence = false;
        isCalibrating = false;
    }

    function startCountdown() {
        isPlayingSequence = false;
        currentSlotIndex = -1;
        currentCycleHits = 0;
        currentCycleMisses = 0;
    }

    function scheduler() {
        if (!isRunning) return;
        while (nextBeatTime < audioCtx.currentTime + 0.1) {
            playTick(nextBeatTime);
            nextBeatTime += secondsPerBeat;
        }
        requestAnimationFrame(scheduler);
    }

    function playTick(time) {
        lastBeatStartTime = time;
        currentSlotIndex++;

        // Визуальное выделение карточек
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        
        if (currentSlotIndex >= 0 && currentSlotIndex < 4) {
            const card = document.getElementById(`card-${currentSlotIndex}`);
            if (card) card.classList.add('active');
            
            // Если мы в режиме игры, планируем цели для нажатий
            if (isPlayingSequence) {
                const type = CARD_TYPES[currentSequence[currentSlotIndex]];
                if (type.hits === 1) {
                    targetTimings.push({ time: time, cardIdx: currentSlotIndex });
                } else if (type.hits === 2) {
                    targetTimings.push({ time: time, cardIdx: currentSlotIndex });
                    targetTimings.push({ time: time + secondsPerBeat/2, cardIdx: currentSlotIndex });
                }
            }
        }

        // Звук метронома
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = currentSlotIndex === 0 ? 880 : 440;
        gain.gain.setValueAtTime(0.1, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        osc.start(time);
        osc.stop(time + 0.05);

        // Переход от отсчета к игре
        if (!isPlayingSequence && currentSlotIndex === 3) {
            isPlayingSequence = true;
            currentSlotIndex = -1; 
            targetTimings = [];
            updateFeedback("PLAY!", "#fff");
        }

        // ФИКС: Проверка конца цикла
        if (!isCalibrating && isPlayingSequence && currentSlotIndex === 3) {
            // Даем небольшую задержку перед проверкой, чтобы последние ноты успели нажаться
            setTimeout(() => {
                const allProcessed = (currentCycleHits + currentCycleMisses) >= expectedHits;
                
                if (allProcessed && currentCycleHits === expectedHits && currentCycleMisses === 0) {
                    perfectStreak++;
                    roll();
                    startCountdown();
                    updateFeedback("EXCELLENT! READY?", "#00cec9");
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else if (allProcessed) {
                    // Если были ошибки, просто сбрасываем счетчики для нового круга
                    perfectStreak = 0;
                    currentCycleHits = 0;
                    currentCycleMisses = 0;
                }
            }, 150);
        }
    }

    function handleTap(e) {
        if (e) e.preventDefault();
        if(!isRunning) return;
        const now = audioCtx.currentTime;

        if (isCalibrating) {
            let diff = now - lastBeatStartTime;
            if (diff > secondsPerBeat / 2) diff -= secondsPerBeat;
            calibrationData.push(diff);
            document.getElementById('calibValueDisplay').innerText = `${diff.toFixed(3)}s`;
            if (calibrationData.length >= 10) {
                userOffset = calibrationData.reduce((a,b)=>a+b, 0) / 10;
                localStorage.setItem('rhythm_offset', userOffset);
                isCalibrating = false;
                stopMetronome();
                updateFeedback("SAVED!", "#00cec9");
            }
            return;
        }

        if (!isPlayingSequence) return;

        let isHit = false;
        let closestCardIdx = -1;
        let minDiff = Infinity;

        // Поиск цели
        for(let i=0; i < targetTimings.length; i++) {
            const target = targetTimings[i];
            const diff = Math.abs(now - (target.time + userOffset));
            
            if (diff < minDiff) {
                minDiff = diff;
                closestCardIdx = target.cardIdx;
            }

            if(diff < 0.25) { // Окно попадания
                targetTimings.splice(i, 1);
                score += 100; 
                isHit = true;
                currentCycleHits++;
                updateFeedback("PERFECT!", "#00cec9");
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                break;
            }
        }
        
        if(!isHit) { 
            score = Math.max(0, score - 50); 
            currentCycleMisses++; 
            updateFeedback("MISS!", "#ff4757"); 
            
            // ФИКС: Красим карточку, в которой БЫЛА нота, а не текущую
            if (closestCardIdx !== -1) {
                triggerVisualError(closestCardIdx);
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
        document.getElementById('scoreDisplay').innerText = score;
    }

    function triggerVisualError(idx) {
        const card = document.getElementById(`card-${idx}`);
        if (card) {
            card.classList.add('error');
            setTimeout(() => card.classList.remove('error'), 400);
        }
    }

    function updateFeedback(text, color) {
        const fb = document.getElementById('feedback');
        fb.innerText = text;
        fb.style.color = color;
    }

    // Инициализация при запуске
    initCards();
    document.getElementById('calibValueDisplay').innerText = `${userOffset.toFixed(3)}s`;

</script>
</body>
</html>
